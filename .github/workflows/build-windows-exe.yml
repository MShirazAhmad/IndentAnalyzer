name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    tags: ['v*']

jobs:
  build-windows-exe:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt || true

      - name: Build single-file EXE with PyInstaller
        run: |
          pyinstaller --clean --onefile --windowed --name IndentAnalyzer src/indent_analyzer_app.py

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: IndentAnalyzer-exe
          path: dist/*.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: IndentAnalyzer ${{ github.ref_name }}
          body: Release built EXE
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/IndentAnalyzer.exe
          asset_name: IndentAnalyzer-${{ github.ref_name }}.exe
          asset_content_type: application/octet-stream
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
