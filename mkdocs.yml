site_name: IndentAnalyzer
site_description: Nanoindentation analysis documentation and code reference
repo_url: https://github.com/MShirazAhmad/IndentAnalyzer
repo_name: MShirazAhmad/IndentAnalyzer

theme:
  name: material

nav:
  - Home: index.md
  - Calculations: calculations.md
  - API Reference: reference/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            merge_init_into_class: true
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
