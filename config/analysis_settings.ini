# Nanoindentation Analysis Configuration
# Used by the GUI researcher workflow as editable defaults.
# Units are listed beside each setting. Dimensionless values are noted explicitly.
# Keep section names and key names unchanged; the GUI reads these names directly.

[analysis]
# Minimum number of numeric points required in the loading segment [count].
min_data_points_loading = 50

# Minimum number of numeric points required in the unloading segment [count].
min_data_points_unloading = 30

# Minimum accepted coefficient of determination for curve fits [dimensionless R^2].
min_r_squared = 0.98

# Fit window used for loading/unloading curve fitting [% of curve segment].
fit_curve_percent = 25.0

# Relative noise threshold used by quality checks [dimensionless fraction].
noise_threshold = 0.15

# Default unloading fit model. Valid examples: oliver_pharr, power_law, auto.
default_fitting_method = oliver_pharr

[calibration]
# Reference material name used for calibration/self-check workflows [text].
reference_material = fused_silica

# Reference reduced/elastic modulus for fused silica [Pa].
reference_modulus = 72e9

# Reference Poisson's ratio for fused silica [dimensionless].
reference_poisson = 0.17

# Reference hardness for fused silica [GPa].
reference_hardness = 9.0

# Default indenter material. Valid examples: diamond, sapphire.
default_indenter = diamond

[loader]
# Default file-loader module name from src/fileloader [text].
default_file_loader = AgilentG200

[validation]
# Maximum plausible hardness accepted by validation [GPa].
max_hardness = 100.0

# Minimum plausible hardness accepted by validation [GPa].
min_hardness = 0.1

# Maximum plausible modulus accepted by validation [Pa].
max_modulus = 1000e9

# Minimum plausible modulus accepted by validation [Pa].
min_modulus = 1e9
