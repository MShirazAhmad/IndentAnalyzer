# Nanoindentation Analysis Package Configuration
# ISO 14577-4:2016 Compliant Settings

[analysis]
# Data quality thresholds
min_data_points_loading = 50
min_data_points_unloading = 30
min_r_squared = 0.98
noise_threshold = 0.15

# Curve fitting parameters
unloading_fit_range = 0.75
stiffness_range_percent = 0.25
max_fitting_iterations = 10000
convergence_tolerance = 1e-8

[calibration]
# Reference material properties
reference_material = fused_silica
reference_modulus = 72e9
reference_poisson = 0.17
reference_hardness = 9.0

# Tip geometry
tip_geometry = berkovich
area_function_terms = 9

[data_paths]
# Default data locations
reference_materials = data/reference_materials/
calibration_data = data/calibration/
output_results = data/results/

[gui]
# Interface settings
default_plot_style = seaborn
figure_dpi = 100
window_size = 1200x800

[validation]
# Quality control limits
max_hardness = 100.0
min_hardness = 0.1
max_modulus = 1000e9
min_modulus = 1e9
